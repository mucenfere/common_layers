<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Basemap Explorer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0f11;
      --panel: #16181c;
      --border: #2a2d35;
      --accent: #c8a96e;
      --accent2: #7eb8d4;
      --text: #e8e4dc;
      --text-muted: #6b7280;
      --tag-bg: #1e2128;
      --active-bg: #1e2128;
      --active-border: #c8a96e;
      --font-mono: 'DM Mono', monospace;
      --font-display: 'Playfair Display', serif;
    }

    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font-mono); }

    /* ── Layout ── */
    #app { display: flex; height: 100vh; }

    /* ── Sidebar ── */
    #sidebar {
      width: 300px;
      min-width: 300px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 1000;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 22px 20px 16px;
      border-bottom: 1px solid var(--border);
    }

    #sidebar-header h1 {
      font-family: var(--font-display);
      font-size: 1.35rem;
      color: var(--accent);
      letter-spacing: 0.01em;
      line-height: 1.2;
    }

    #sidebar-header p {
      font-size: 0.68rem;
      color: var(--text-muted);
      margin-top: 5px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* search */
    #search-wrap {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }

    #search {
      width: 100%;
      background: var(--tag-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.75rem;
      padding: 7px 10px;
      outline: none;
      transition: border-color 0.2s;
    }
    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--text-muted); }

    /* filter tabs */
    #filter-tabs {
      display: flex;
      gap: 6px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .filter-tab {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-tab:hover { border-color: var(--accent); color: var(--accent); }
    .filter-tab.active { background: var(--accent); border-color: var(--accent); color: #0e0f11; font-weight: 500; }

    /* map list */
    #map-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 10px;
    }

    #map-list::-webkit-scrollbar { width: 4px; }
    #map-list::-webkit-scrollbar-track { background: transparent; }
    #map-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .category-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      padding: 10px 8px 5px;
    }

    .map-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
      border: 1px solid transparent;
      margin-bottom: 2px;
    }
    .map-item:hover { background: var(--tag-bg); }
    .map-item.active {
      background: var(--active-bg);
      border-color: var(--active-border);
    }

    .map-item-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .map-item-info { flex: 1; min-width: 0; }

    .map-item-name {
      font-size: 0.78rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 500;
    }
    .map-item.active .map-item-name { color: var(--accent); }

    .map-item-desc {
      font-size: 0.62rem;
      color: var(--text-muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .map-item-zoom {
      font-size: 0.6rem;
      color: var(--text-muted);
      flex-shrink: 0;
      background: var(--tag-bg);
      padding: 2px 5px;
      border-radius: 3px;
      border: 1px solid var(--border);
    }

    /* count badge */
    #count-badge {
      padding: 8px 20px;
      font-size: 0.62rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      letter-spacing: 0.04em;
    }

    /* ── Map Area ── */
    #map-container { flex: 1; position: relative; }
    #map { width: 100%; height: 100%; }

    /* overlay info */
    #overlay-info {
      position: absolute;
      top: 16px; right: 16px;
      z-index: 900;
      background: rgba(14,15,17,0.88);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 18px;
      max-width: 260px;
      pointer-events: none;
    }

    #overlay-name {
      font-family: var(--font-display);
      font-size: 1rem;
      color: var(--accent);
      margin-bottom: 4px;
    }

    #overlay-desc {
      font-size: 0.68rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    #overlay-tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .tag {
      font-size: 0.58rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      padding: 2px 7px;
      border-radius: 3px;
      border: 1px solid var(--border);
      color: var(--text-muted);
    }
    .tag.zoom { border-color: var(--accent2); color: var(--accent2); }

    /* zoom display */
    #zoom-display {
      position: absolute;
      bottom: 30px; right: 16px;
      z-index: 900;
      background: rgba(14,15,17,0.8);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 5px 10px;
      font-size: 0.65rem;
      color: var(--text-muted);
    }

    /* leaflet overrides */
    .leaflet-control-zoom a {
      background: var(--panel) !important;
      color: var(--text) !important;
      border-color: var(--border) !important;
    }
    .leaflet-control-zoom a:hover { background: var(--tag-bg) !important; color: var(--accent) !important; }
    .leaflet-control-attribution {
      background: rgba(14,15,17,0.75) !important;
      color: var(--text-muted) !important;
      font-size: 0.6rem !important;
    }
    .leaflet-control-attribution a { color: var(--accent2) !important; }

    /* hidden items from search */
    .map-item.hidden { display: none; }
    .category-section.hidden { display: none; }
  </style>
</head>
<body>
<div id="app">

  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sidebar-header">
      <h1>Basemap Explorer</h1>
      <p>배경지도 비교 도구 · 개인용</p>
    </div>

    <div id="search-wrap">
      <input id="search" type="text" placeholder="지도 이름 검색..." autocomplete="off" />
    </div>

    <div id="filter-tabs">
      <button class="filter-tab active" data-filter="all">전체</button>
      <button class="filter-tab" data-filter="street">도로</button>
      <button class="filter-tab" data-filter="terrain">지형</button>
      <button class="filter-tab" data-filter="satellite">위성</button>
      <button class="filter-tab" data-filter="minimal">미니멀</button>
      <button class="filter-tab" data-filter="dark">다크</button>
      <button class="filter-tab" data-filter="historical">역사</button>
    </div>

    <div id="map-list"></div>

    <div id="count-badge" id="count-badge">로딩 중...</div>
  </div>

  <!-- Map -->
  <div id="map-container">
    <div id="map"></div>
    <div id="overlay-info">
      <div id="overlay-name">지도를 선택하세요</div>
      <div id="overlay-desc">좌측 목록에서 배경지도를 선택하면 여기에 정보가 표시됩니다.</div>
      <div id="overlay-tags"></div>
    </div>
    <div id="zoom-display">Zoom: <span id="zoom-val">4</span></div>
  </div>

</div>

  {
    id: 'stadia-outdoors', name: 'Stadia Outdoors', category: 'terrain', tags: ['terrain'],
    color: '#90c97a',
    desc: '아웃도어 활동용 지형 지도. 등산로 등 포함.',
    url: 'https://tiles.stadiamaps.com/tiles/outdoors/{z}/{x}/{y}{r}.png',
    opts: { maxZoom: 20, attribution: '© Stadia Maps, © OpenStreetMap' }
  },

  // ── 역사/특수
  {
    id: 'thunderforest-landscape', name: 'Thunderforest Landscape', category: 'terrain', tags: ['terrain'],
    color: '#90c97a',
    desc: '자연 중심의 경관 지도. 지형 색상이 풍부.',
    url: 'https://{s}.tile.thunderforest.com/landscape/{z}/{x}/{y}.png?apikey=',
    opts: { maxZoom: 22, attribution: '© Thunderforest, © OpenStreetMap', note: 'API 키 필요' }
  },
  {
    id: 'wikimedia', name: 'Wikimedia Maps', category: 'street', tags: ['street'],
    color: '#7eb8d4',
    desc: '위키미디어 기반 지도. 다국어 레이블 지원.',
    url: 'https://maps.wikimedia.org/osm-intl/{z}/{x}/{y}{r}.png',
    opts: { maxZoom: 19, attribution: '© Wikimedia Maps, © OpenStreetMap' }
  },
];

// ── 카테고리 정의 ──
const CATEGORIES = [
  { id: 'street',    label: '도로 지도' },
  { id: 'terrain',   label: '지형 지도' },
  { id: 'satellite', label: '위성 사진' },
  { id: 'minimal',   label: '미니멀' },
  { id: 'dark',      label: '다크 테마' },
  { id: 'historical',label: '역사/특수' },
];

// ── Leaflet 초기화 ──
const map = L.map('map', {
  center: [35, 110],
  zoom: 4,
  zoomControl: true,
});

let currentLayer = null;
let activeId = null;

function loadMap(mapDef) {
  if (currentLayer) map.removeLayer(currentLayer);
  activeId = mapDef.id;

  const opts = { ...mapDef.opts };
  if (opts.note) delete opts.note; // internal flag

  if (mapDef.opts.subdomains) {
    currentLayer = L.tileLayer(mapDef.url, opts).addTo(map);
  } else {
    currentLayer = L.tileLayer(mapDef.url, opts).addTo(map);
  }

  // overlay info
  document.getElementById('overlay-name').textContent = mapDef.name;
  document.getElementById('overlay-desc').textContent = mapDef.desc + (mapDef.opts.note ? ` ⚠️ ${mapDef.opts.note}` : '');

  const tagsEl = document.getElementById('overlay-tags');
  tagsEl.innerHTML = '';
  mapDef.tags.forEach(t => {
    const span = document.createElement('span');
    span.className = 'tag';
    span.textContent = t;
    tagsEl.appendChild(span);
  });
  const zoomTag = document.createElement('span');
  zoomTag.className = 'tag zoom';
  zoomTag.textContent = `maxZ: ${mapDef.opts.maxZoom}`;
  tagsEl.appendChild(zoomTag);

  // active state
  document.querySelectorAll('.map-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === mapDef.id);
  });
}

// ── Sidebar 렌더링 ──
let currentFilter = 'all';
let currentSearch = '';

function renderList() {
  const listEl = document.getElementById('map-list');
  listEl.innerHTML = '';

  CATEGORIES.forEach(cat => {
    const items = MAPS.filter(m => {
      const matchCat = currentFilter === 'all' || m.tags.includes(currentFilter);
      const matchSearch = currentSearch === '' || m.name.toLowerCase().includes(currentSearch) || m.desc.includes(currentSearch);
      return m.category === cat.id && matchCat && matchSearch;
    });

    if (items.length === 0) return;

    const section = document.createElement('div');
    section.className = 'category-section';

    const label = document.createElement('div');
    label.className = 'category-label';
    label.textContent = cat.label;
    section.appendChild(label);

    items.forEach(m => {
      const item = document.createElement('div');
      item.className = 'map-item' + (m.id === activeId ? ' active' : '');
      item.dataset.id = m.id;

      item.innerHTML = `
        <div class="map-item-dot" style="background:${m.color}"></div>
        <div class="map-item-info">
          <div class="map-item-name">${m.name}</div>
          <div class="map-item-desc">${m.desc}</div>
        </div>
        <div class="map-item-zoom">Z${m.opts.maxZoom}</div>
      `;

      item.addEventListener('click', () => {
        loadMap(m);
        renderList();
      });

      section.appendChild(item);
    });

    listEl.appendChild(section);
  });

  // count
  const visible = MAPS.filter(m => {
    const matchCat = currentFilter === 'all' || m.tags.includes(currentFilter);
    const matchSearch = currentSearch === '' || m.name.toLowerCase().includes(currentSearch) || m.desc.includes(currentSearch);
    return matchCat && matchSearch;
  }).length;

  document.getElementById('count-badge').textContent = `${visible} / ${MAPS.length} 개 지도`;
}

// 필터 탭
document.querySelectorAll('.filter-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderList();
  });
});

// 검색
document.getElementById('search').addEventListener('input', e => {
  currentSearch = e.target.value.toLowerCase();
  renderList();
});

// 줌 표시
map.on('zoomend', () => {
  document.getElementById('zoom-val').textContent = map.getZoom();
});

// 초기 로드
renderList();
loadMap(MAPS[0]);
</script>
</body>
</html>
